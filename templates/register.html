<!DOCTYPE html>
<html>
<head><title>Register</title></head>
<body>
    <nav>
        <a href="/">Calculator</a> | <a href="/login">Login</a> | <a href="/register">Register</a>
    </nav>
    <h2>Create an Account</h2>
    <form id="registerForm" novalidate>
        <input type="text" id="username" placeholder="Username" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Password (min 6 chars)" minlength="6" required><br><br>
        <button type="submit" id="registerBtn">Register</button>
    </form>
    <p id="message" style="color:red;"></p>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(password.length < 6) {
                document.getElementById('message').innerText = "Password must be at least 6 characters.";
                return;
            }

            const res = await fetch('/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                document.getElementById('message').style.color = "green";
                document.getElementById('message').innerText = "Registration successful! Please login.";
            } else {
                const data = await res.json();
                document.getElementById('message').innerText = data.detail || "Registration failed.";
            }
        });
    </script>
</body>
</html>
