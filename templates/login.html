<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
    <nav>
        <a href="/">Calculator</a> | <a href="/login">Login</a> | <a href="/register">Register</a>
    </nav>
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username or Email" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit" id="loginBtn">Login</button>
    </form>
    <p id="message" style="color:red;"></p>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username_or_email: username, password: password })
            });

            if (res.ok) {
                const data = await res.json();
                // Store JWT token securely in localStorage
                localStorage.setItem('token', data.access_token);
                window.location.href = "/"; // Redirect to calculator
            } else {
                document.getElementById('message').innerText = "Invalid credentials";
            }
        });
    </script>
</body>
</html>
